name: Pre-release dependency testing

on:
  schedule:
    - cron: "30 6 * * 1"  # Monday 6:30am UTC (offset from CodeQL at 6:00)
  workflow_dispatch:

permissions: {}

jobs:
  prerelease-test:
    name: pytest (pre-release deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install with pre-release dependencies
        run: uv sync --upgrade --prerelease=allow

      - name: Run tests
        run: uv run --no-sync pytest

      - name: Add results to summary
        if: always()
        run: |
          {
            echo "## Pre-release dependency test"
            echo ""
            echo "Tested with \`--prerelease=allow\` to catch upstream breakage early."
            echo ""
            echo "### Installed versions"
            echo '```'
            uv pip list --python .venv/bin/python 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
