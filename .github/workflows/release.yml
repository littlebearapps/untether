name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Check tag matches project version
        run: |
          uv run --no-project python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          tag = os.environ.get('GITHUB_REF_NAME', '')
          tag_version = tag[1:] if tag.startswith('v') else tag

          pyproject = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          project_version = pyproject['project']['version']

          init_version = None
          init_path = Path('src') / 'untether' / '__init__.py'
          if init_path.is_file():
            m = re.search(r'__version__\s*=\s*"([^"]+)"', init_path.read_text(encoding='utf-8'))
            if m:
              init_version = m.group(1)

          if project_version != tag_version:
            raise SystemExit(f"Tag {tag!r} does not match pyproject version {project_version!r}")
          if init_version and init_version != project_version:
            raise SystemExit(
              f"src/untether/__init__.py __version__ {init_version!r} does not match pyproject version {project_version!r}"
            )

          print(f"OK: tag {tag!r} matches version {project_version!r}")
          PY

      - name: Run tests
        run: uv run pytest

      - name: Build (wheel + sdist)
        run: uv build

      - name: Inspect with twine and check-wheel-contents
        run: |
          uvx twine check dist/*
          uvx check-wheel-contents dist/*.whl

      - name: Upload packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: Packages
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/untether
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing to PyPI
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist/
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create GitHub release + upload artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: dist/

      - name: Create GitHub release and upload artifacts
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: |
            dist/*


